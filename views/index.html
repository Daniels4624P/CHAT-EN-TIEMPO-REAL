<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat privado con Socket.IO</title>
  <style>
    :root {
      --primary-color: #4a6fa5;
      --primary-dark: #3a5985;
      --accent-color: #6c63ff;
      --text-color: #f5f5f5;
      --background-dark: #1e1e1e;
      --panel-bg: #2d2d2d;
      --input-bg: #333;
      --message-sent: #3d7c47;
      --message-received: #7c3d47;
      --border-radius: 8px;
      --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background-dark);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 1rem;
      gap: 1rem;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 250px;
      background-color: var(--panel-bg);
      padding: 1rem;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar h3 {
      color: var(--accent-color);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #conversations {
      overflow-y: auto;
      flex-grow: 1;
    }

    .conversation {
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: var(--border-radius);
      transition: var(--transition);
      cursor: pointer;
    }

    .conversation:hover {
      background-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    /* Auth Form Styles */
    .auth-form {
      flex-grow: 1;
      padding: 2rem;
      background-color: var(--panel-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 500px;
      margin: auto;
    }

    .auth-form h3 {
      color: var(--accent-color);
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 1.5rem;
    }

    .auth-form input, 
    .auth-form button,
    .chat-container input,
    .chat-container textarea,
    .chat-container button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: var(--border-radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
      transition: var(--transition);
    }

    .auth-form input:focus,
    .chat-container input:focus,
    .chat-container textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(108, 99, 255, 0.2);
    }

    .auth-form button,
    .chat-container button {
      background-color: var(--primary-color);
      cursor: pointer;
      font-weight: bold;
      margin-top: 0.5rem;
      border: none;
    }

    .auth-form button:hover,
    .chat-container button:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
    }

    .auth-form p {
      text-align: center;
      margin-top: 1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .auth-form a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: bold;
    }

    .auth-form a:hover {
      text-decoration: underline;
    }

    /* Chat Container Styles */
    .chat-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      background-color: var(--panel-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      height: 100%;
    }

    .chat-container h3 {
      color: var(--accent-color);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .message-header {
      display: flex;
      align-items: center;
      margin-bottom: 1rem;
    }

    .message-header input {
      margin-bottom: 0;
    }

    #msgInput {
      resize: none;
      height: 80px;
      margin-bottom: 0.5rem;
    }

    .chat-box {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1rem;
      background-color: rgba(0, 0, 0, 0.2);
      border-radius: var(--border-radius);
      margin: 1rem 0;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: var(--border-radius);
      max-width: 80%;
      position: relative;
      background-color: rgba(255, 255, 255, 0.05);
      word-break: break-word;
    }

    .message.system {
      background-color: transparent;
      color: #aaa;
      font-size: 0.85rem;
      text-align: center;
      margin: 0.5rem auto;
      padding: 0.25rem;
    }

    .message.user-message {
      align-self: flex-end;
      background-color: var(--message-sent);
    }

    .message.receiver-message {
      align-self: flex-start;
      background-color: var(--message-received);
    }

    .message-time {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.25rem;
      text-align: right;
    }

    .logout-btn {
      background-color: #7c3d47;
      margin-top: 1rem;
    }

    .logout-btn:hover {
      background-color: #6c2737;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        height: auto;
        max-height: 200px;
      }
      
      .auth-form {
        width: 100%;
      }
      
      .chat-container {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barra lateral -->
    <div class="sidebar" id="sidebar">
      <h3>Conversaciones</h3>
      <div id="conversations"></div>
    </div>

    <!-- Contenedor de formularios de autenticación -->
    <div class="auth-form" id="auth-form">
      <div id="register-form">
        <h3>Registrarse</h3>
        <input type="text" id="username" placeholder="Nombre de usuario" />
        <input type="email" id="email" placeholder="Correo electrónico" />
        <input type="password" id="password" placeholder="Contraseña" />
        <button onclick="register()">Registrarse</button>
        <p>Ya tienes cuenta? <a href="#" onclick="toggleForms()">Iniciar sesión</a></p>
      </div>

      <div id="login-form" style="display:none;">
        <h3>Iniciar sesión</h3>
        <input type="email" id="login-email" placeholder="Correo electrónico" />
        <input type="password" id="login-password" placeholder="Contraseña" />
        <button onclick="login()">Iniciar sesión</button>
        <p>¿No tienes cuenta? <a href="#" onclick="toggleForms()">Regístrate</a></p>
      </div>
    </div>

    <!-- Contenedor de chat -->
    <div class="chat-container" id="chat-container">
      <h3>Chat</h3>
      <div class="message-header">
        <input type="text" id="toUser" placeholder="Usuario receptor" />
      </div>
      <textarea id="msgInput" placeholder="Escribe tu mensaje..."></textarea>
      <button onclick="sendMessage()">Enviar</button>

      <div class="chat-box" id="chatBox"></div>

      <button onclick="logout()" class="logout-btn">Cerrar sesión</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const baseUrl = 'https://chat-en-tiempo-real-ll1q.onrender.com/api/v1/auth';
    let socket = null;

    // Agregar el mensaje al chat
    function appendMessage(text, time) {
      const div = document.createElement("div");
      div.className = "message";
      
      // Determinar si es un mensaje enviado o recibido
      if (text.includes("→")) {
        const parts = text.split("→");
        const sender = parts[0].trim();
        const currentUser = document.getElementById("toUser").value;
        
        if (sender === currentUser) {
          div.classList.add("receiver-message");
        } else {
          div.classList.add("user-message");
        }
      } else {
        div.classList.add("system");
      }

      const timeDiv = document.createElement("div");
      timeDiv.className = "message-time";
      timeDiv.textContent = time;

      div.innerHTML = `${text} <div class="message-time">${timeDiv.textContent}</div>`;
      document.getElementById("chatBox").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    // Verificar si el usuario está autenticado al cargar la página
    async function checkAuthentication() {
      const res = await fetch(`${baseUrl}/me`, { method: 'GET', credentials: 'include' });
      const data = await res.json();
      if (data && data.username) {
        document.getElementById("auth-form").style.display = "none"; // Ocultar el formulario de autenticación
        document.getElementById("chat-container").style.display = "block"; // Mostrar el chat
        connectSocket(); // Conectar con Socket.IO
        getConversations(); // Obtener las conversaciones del usuario
      } else {
        document.getElementById("auth-form").style.display = "block"; // Mostrar el formulario de autenticación
        document.getElementById("chat-container").style.display = "none"; // Ocultar el chat
      }
    }

    function updateConversations(messages) {
      const currentUserId = getCurrentUserId(); // Asegúrate de que esto esté bien implementado
      const conversationsMap = new Map();

      messages.forEach(msg => {
        const convoId = msg.conversation_id;
        if (!conversationsMap.has(convoId)) {
          const isCurrentUserUser1 = msg.user1_id === currentUserId;
          const otherUsername = isCurrentUserUser1 ? msg.user2_username : msg.user1_username;
          const otherUserId = isCurrentUserUser1 ? msg.user2_id : msg.user1_id;

          conversationsMap.set(convoId, {
            conversationId: convoId,
            otherUserId: otherUserId,
            otherUsername: otherUsername,
            lastMessage: msg.content,
            time: msg.last_message_time,
          });
        }
      });

      const conversationsContainer = document.getElementById("conversations");
      conversationsContainer.innerHTML = '';

      conversationsMap.forEach((convo) => {
        const div = document.createElement("div");
        div.className = "conversation";
        div.textContent = convo.otherUsername;
        div.onclick = () => startChat(convo.otherUsername); // O pasa el ID si prefieres
        conversationsContainer.appendChild(div);
      });
    }

    function startChat(otherUsername) {
      document.getElementById("toUser").value = otherUsername;
      document.getElementById("chatBox").innerHTML = ''; // Limpiar chat

      // Pedir mensajes al servidor
      if (socket && socket.connected) {
        socket.emit("getConversation", { username: otherUsername });
      }
    }

    // Mostrar u ocultar los formularios
    function toggleForms() {
      const registerForm = document.getElementById("register-form");
      const loginForm = document.getElementById("login-form");
      if (registerForm.style.display === "none") {
        registerForm.style.display = "block";
        loginForm.style.display = "none";
      } else {
        registerForm.style.display = "none";
        loginForm.style.display = "block";
      }
    }

    // Registro de usuario
    async function register() {
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${baseUrl}/register`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      alert(data.message || "Registro exitoso");
    }

    // Login de usuario
    async function login() {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const res = await fetch(`${baseUrl}/login`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      alert(data.message || "Login exitoso");

      // Conectar con Socket.IO después del login
      connectSocket();

      // Ocultar el formulario de autenticación
      document.getElementById("auth-form").style.display = "none";
      document.getElementById("chat-container").style.display = "block"; // Mostrar el chat
    }

    // Obtener las conversaciones del usuario
    async function getConversations() {
      const res = await fetch(`${baseUrl}/me`, {
        method: "GET",
        credentials: "include",
      });
      const data = await res.json();
      const conversations = data.conversations || [];
      
      const conversationsContainer = document.getElementById("conversations");
      conversationsContainer.innerHTML = '';
      
      conversations.forEach(convo => {
        const div = document.createElement("div");
        div.className = "conversation";
        div.textContent = convo.username;
        div.onclick = () => startChat(convo.username);
        conversationsContainer.appendChild(div);
      });
    }

    // Conexión con Socket.IO
    function connectSocket() {
      socket = io("https://chat-en-tiempo-real-ll1q.onrender.com", { withCredentials: true });

      socket.on("connect", () => {
        document.getElementById("chat-container").style.display = "block"; // Mostrar el chat
        getConversations(); // Obtener conversaciones cuando el usuario se conecta
      });

      socket.on("message", (data) => {
        const currentChatUser = document.getElementById("toUser").value;
        console.log("📨 Recibido:", data);
        console.log("👤 Chat actual:", currentChatUser);

        const isToCurrentChat = data.de === currentChatUser || data.para === currentChatUser;

        if (isToCurrentChat) {
          appendMessage(`${data.de} → ${data.para}: ${data.message}`, new Date(data.date_time).toLocaleTimeString('es-ES', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false // usa formato 24h, cambia a true para 12h con AM/PM
        }))} else {
          console.log("📭 Mensaje ignorado: no es del chat abierto");
          console.log("⚖️ Comparando:", data.de, "==", currentChatUser, "||", data.para, "==", currentChatUser);
        }
      });

      socket.on("disconnect", () => {
        appendMessage("🔌 Desconectado del servidor", true);
      });

      socket.on("earrings messages", (data) => {
        if (data.conversations) {
          updateConversations(data.conversations);
        }
      });

      socket.on("conversationMessages", (messages) => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = '';

        messages.forEach(msg => {
          const text = `${msg.sender_username} → ${msg.receiver_username}: ${msg.content}`;
          appendMessage(text, msg.date_time);
        });
      });
    }

    // Enviar mensaje al receptor
    function sendMessage() {
      const msg = document.getElementById("msgInput").value;
      const receiver = document.getElementById("toUser").value;
      const time = new Date().toLocaleTimeString();

      if (!socket || !socket.connected) {
        alert("No estás conectado");
        return;
      }
      
      socket.emit("message", msg, receiver, time);
      document.getElementById("msgInput").value = "";
    }

    // Iniciar un chat con un usuario
    function startChat(otherUsername) {
      document.getElementById("toUser").value = otherUsername;
      document.getElementById("chatBox").innerHTML = '';
      if (socket && socket.connected) {
        socket.emit("getConversation", { username: otherUsername });
      }
    }

    async function logout() {
      const res = await fetch(`${baseUrl}/logout`, {
        method: 'POST',
        credentials: 'include', // Incluye cookies para el request
      });

      const data = await res.json();
      alert(data.message || "Sesión cerrada exitosamente");

      // Desconectar el socket y limpiar la interfaz
      if (socket) {
        socket.disconnect();
      }

      // Mostrar el formulario de autenticación nuevamente
      document.getElementById("chat-container").style.display = "none";
      document.getElementById("auth-form").style.display = "block";
    }

    let currentUser = null;

    async function checkAuthentication() {
      const res = await fetch(`${baseUrl}/me`, { method: 'GET', credentials: 'include' });
      const data = await res.json();
      if (data && data.username) {
        currentUser = data; // Guardar usuario actual
      }
    }

    function getCurrentUserId() {
      return currentUser?.id; // O como venga del backend
    }

    // Verificar la autenticación cuando se carga la página
    window.onload = checkAuthentication;
  </script>
</body>
</html>
